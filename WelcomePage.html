<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome - Smart Shift System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4CAF50, #2e7d32);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 120px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            background: white;
            color: #2e7d32;
            border: none;
            padding: 12px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Smart Shift Scheduling System</h1>
    <p>Manage RA schedules, availability, and assignments efficiently</p>

    <button class="btn" onclick="goToLogin()">Login</button>
    <button class="btn" onclick="goToRegister()">Create Account</button>
</div>

<script>
    function goToLogin() {
        alert("Redirect to Login (connect to your CLI or future web backend)");
    }

    function goToRegister() {
        alert("Redirect to Create User (Admin/RA)");
    }
</script>

</body>
</html>
